name: Create Public Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Prerelease or not'
        type: boolean
        required: true
        default: true
      releaseWindows_x64:
        description: 'Release Windows x64 assets?'
        type: boolean
        required: false
        default: true
      releaseWindows_x86:
        description: 'Release Windows x86 assets?'
        type: boolean
        required: false
        default: true
      windows_run_id:
        description: 'Windows build run ID in cpartisans/tdesktop (leave empty for latest successful run)'
        type: string
        required: false
        default: ''
      releaseLinux:
        description: 'Release Linux assets?'
        type: boolean
        required: false
        default: true
      releaseMacOS:
        description: 'Release MacOS assets?'
        type: boolean
        required: false
        default: true
      releaseSnap:
        description: 'Release Snap assets?'
        type: boolean
        required: false
        default: true
      add_to_existing_release:
        description: 'Add to existing release for this version instead of creating a new one?'
        type: boolean
        required: false
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - id: parsing_step
        name: Determine version
        run: |
          wget https://raw.githubusercontent.com/wrwrabbit/tdesktop/master/Telegram/SourceFiles/core/version.h
          wget https://raw.githubusercontent.com/wrwrabbit/tdesktop/master/Telegram/build/ptelegram_release_body.py
          wget https://raw.githubusercontent.com/wrwrabbit/tdesktop/master/ptelegram_changelog.md

          echo "VERSION=$(cat version.h | grep PTelegramAppVersionStr | awk -F " " 'END { print $5 }' | sed 's/"//g' | sed 's/;//g')" >> $GITHUB_ENV
          echo "TG_VERSION=$(cat version.h | grep 'AppVersionStr ' | awk -F '"' 'NR==1 { print $2 }')" >> $GITHUB_ENV

      - name: Prepare changelog
        if: github.event.inputs.add_to_existing_release != 'true'
        run: |
          python3 ptelegram_release_body.py --input_file ptelegram_changelog.md --output_file ptelegram_changelog_${{ env.VERSION }}.md --version ${{ env.VERSION }} --tg_version ${{ env.TG_VERSION }}

      - name: Download Windows x64 portable (latest successful)
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseWindows_x64 == 'true' && github.event.inputs.windows_run_id == ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy_win.yml
          workflow_conclusion: success
          branch: master
          repo: cpartisans/tdesktop
          name: Telegram_x64
          path: Windows/Telegram_x64

      - name: Download Windows x64 portable (specific run)
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseWindows_x64 == 'true' && github.event.inputs.windows_run_id != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy_win.yml
          run_id: ${{ github.event.inputs.windows_run_id }}
          repo: cpartisans/tdesktop
          name: Telegram_x64
          path: Windows/Telegram_x64

      - name: Download Windows x86 portable (latest successful)
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseWindows_x86 == 'true' && github.event.inputs.windows_run_id == ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy_win.yml
          workflow_conclusion: success
          branch: master
          repo: cpartisans/tdesktop
          name: Telegram_x64_x86
          path: Windows/Telegram_x64_x86

      - name: Download Windows x86 portable (specific run)
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseWindows_x86 == 'true' && github.event.inputs.windows_run_id != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy_win.yml
          run_id: ${{ github.event.inputs.windows_run_id }}
          repo: cpartisans/tdesktop
          name: Telegram_x64_x86
          path: Windows/Telegram_x64_x86

      - name: Download Windows x64 installer (latest successful)
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseWindows_x64 == 'true' && github.event.inputs.windows_run_id == ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy_win.yml
          workflow_conclusion: success
          branch: master
          repo: cpartisans/tdesktop
          path: WindowsSetup
          name: Telegram_x64_setup

      - name: Download Windows x64 installer (specific run)
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseWindows_x64 == 'true' && github.event.inputs.windows_run_id != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy_win.yml
          run_id: ${{ github.event.inputs.windows_run_id }}
          repo: cpartisans/tdesktop
          path: WindowsSetup
          name: Telegram_x64_setup

      - name: Download Windows x86 installer (latest successful)
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseWindows_x86 == 'true' && github.event.inputs.windows_run_id == ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy_win.yml
          workflow_conclusion: success
          branch: master
          repo: cpartisans/tdesktop
          path: WindowsSetup
          name: Telegram_x64_x86_setup

      - name: Download Windows x86 installer (specific run)
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseWindows_x86 == 'true' && github.event.inputs.windows_run_id != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy_win.yml
          run_id: ${{ github.event.inputs.windows_run_id }}
          repo: cpartisans/tdesktop
          path: WindowsSetup
          name: Telegram_x64_x86_setup

      - name: Download Linux artifacts
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseLinux == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy_linux.yml
          workflow_conclusion: success
          branch: master
          repo: cpartisans/tdesktop
          path: Linux
          name: build_gh

      - name: Download MacOS artifacts
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseMacOS == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy_mac.yml
          workflow_conclusion: success
          branch: master
          repo: cpartisans/tdesktop
          path: MacOS
          name: telegram-dmg

      - name: Download Snap artifacts
        uses: dawidd6/action-download-artifact@v2
        if: github.event.inputs.releaseSnap == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: snap.yml
          workflow_conclusion: success
          branch: master
          repo: wrwrabbit/tdesktop
          path: Snap

      - name: Check version consistency
        # disabled: no version suffix in downloaded artifact filenames
        if: false
        run: |
          echo "Found versions:"
          find -name "t*" | grep -Po "\d{7}$" | sort -u
          UNIQUE=$(find -name "t*" | grep -Po "\d{7}$" | sort -u | wc -l)
          if [ "$UNIQUE" != "1" ]; then
            echo More than one version downloaded
            exit 1
          fi

      - name: Resolve or Create Release
        id: resolve_release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = 'v.${{ env.VERSION }}';
            let release;
            if ('${{ github.event.inputs.add_to_existing_release }}' === 'true') {
              const resp = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
              });
              release = resp.data;
              console.log(`Using existing release: ${release.name} (id=${release.id})`);
            } else {
              const fs = require('fs');
              const body = fs.readFileSync('ptelegram_changelog_${{ env.VERSION }}.md', 'utf8');
              const resp = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: 'Version ${{ env.VERSION }}',
                body: body,
                draft: false,
                prerelease: ${{ github.event.inputs.prerelease }},
              });
              release = resp.data;
              console.log(`Created new release: ${release.name} (id=${release.id})`);
            }
            core.setOutput('release_id', String(release.id));
            core.setOutput('tag_name', release.tag_name);
            core.setOutput('release_name', release.name);

      - name: Upload Windows x64 Files
        uses: "actions/github-script@v8"
        if: github.event.inputs.releaseWindows_x64 == 'true'
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const fs = require('fs').promises;
            await github.rest.repos.uploadReleaseAsset({
              name: 'tportable-x64.latest.zip',
              label: 'Windows 64 bit: Portable',
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ steps.resolve_release.outputs.release_id }},
              data: await fs.readFile('Windows/Telegram_x64/tportable-x64.latest.zip')
            });
            await github.rest.repos.uploadReleaseAsset({
              name: 'tsetup-x64.latest.exe',
              label: 'Windows 64 bit: Installer',
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ steps.resolve_release.outputs.release_id }},
              data: await fs.readFile('WindowsSetup/tsetup-x64.latest.exe')
            });

      - name: Upload Windows x86 Files
        uses: "actions/github-script@v8"
        if: github.event.inputs.releaseWindows_x86 == 'true'
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const fs = require('fs').promises;
            await github.rest.repos.uploadReleaseAsset({
              name: 'tportable.latest.zip',
              label: 'Windows 32 bit: Portable',
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ steps.resolve_release.outputs.release_id }},
              data: await fs.readFile('Windows/Telegram_x64_x86/tportable.latest.zip')
            });
            await github.rest.repos.uploadReleaseAsset({
              name: 'tsetup.latest.exe',
              label: 'Windows 32 bit: Installer',
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ steps.resolve_release.outputs.release_id }},
              data: await fs.readFile('WindowsSetup/tsetup.latest.exe')
            });

      - name: Upload Linux Files
        uses: "actions/github-script@v8"
        if: github.event.inputs.releaseLinux == 'true'
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const fs = require('fs').promises;
            await github.rest.repos.uploadReleaseAsset({
              name: 'tsetup.latest.tar.xz',
              label: 'Linux 64 bit: Binary',
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ steps.resolve_release.outputs.release_id }},
              data: await fs.readFile('Linux/tsetup.latest.tar.xz')
            });

      - name: Upload MacOS Files
        uses: "actions/github-script@v8"
        if: github.event.inputs.releaseMacOS == 'true'
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const fs = require('fs').promises;
            await github.rest.repos.uploadReleaseAsset({
              name: 'tsetup.latest.dmg',
              label: 'macOS 10.13+: Installer',
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ steps.resolve_release.outputs.release_id }},
              data: await fs.readFile('MacOS/tsetup.latest.dmg')
            });

      - name: Upload Snap Files
        uses: softprops/action-gh-release@v1
        if: github.event.inputs.releaseSnap == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{ steps.resolve_release.outputs.tag_name }}"
          name: "${{ steps.resolve_release.outputs.release_name }}"
          files: |
            Snap/**

      - name: Create cleanup request
        run: touch delete_request
